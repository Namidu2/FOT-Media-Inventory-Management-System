<div class="login-container">
    <div class="login-left">
        <img src="/FOT-LOGO_PNG_Black .png" alt="FOT Logo" class="login-logo">
        <h1 class="login-title">WELCOME BACK!</h1>
        <p class="login-subtitle">Please Enter Your Login Details</p>

        <label for="email" class="login-label">Email / Registration Number</label>
        <div class="login-input-group">
              <i class="fa-solid fa-user" aria-hidden="true"></i>
            <input id="email" type="text" placeholder="president@tec.rjt.ac.lk" class="login-input">
        </div>

        <label for="password" class="login-label">Password</label>
        <div class="login-input-group">
            <i class="fa-solid fa-lock" aria-hidden="true"></i>
            <input id="password" [type]="passwordVisible ? 'text' : 'password'" placeholder="********" class="login-input">
            <button type="button" class="login-eye" (click)="togglePassword()" aria-label="Toggle password visibility">
                <i *ngIf="!passwordVisible" class="fa-regular fa-eye" aria-hidden="true"></i>
                <i *ngIf="passwordVisible" class="fa-solid fa-eye-slash" aria-hidden="true"></i>
            </button>
        </div>

        <button class="login-button">Log In</button>
    </div>

    <div class="login-right">
        <div class="login-right-content">
            <h1 class="login-right-title">OFFICIAL MEDIA UNIT</h1>
            <h2 class="login-right-text">FACULTY OF TECHNOLOGY</h2>
            <h2 class="login-right-text">RAJARATA UNIVERSITY OF SRI LANKA</h2>
        </div>
    </div>
</div>
